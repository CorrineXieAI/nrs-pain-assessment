<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>我的紀錄｜NRS 疼痛評估</title>
    <link rel="stylesheet" href="./style.css">
  </head>
  <body>
    <header class="site-header">
      <div class="header-inner">
        <a class="brand" href="./assessment.html">NRS 疼痛評估</a>
        <nav class="nav" aria-label="主要選單">
          <a href="./assessment.html">新增評估</a>
          <a href="./records.html">我的紀錄</a>
          <button class="button text" data-logout type="button">登出</button>
        </nav>
      </div>
    </header>

    <main class="container">
      <div class="page-heading">
        <div>
          <p class="eyebrow">My records</p>
          <h1>我的疼痛紀錄</h1>
          <p class="muted">登入帳號：<span id="user-email">讀取中</span></p>
        </div>
        <a class="button" href="./assessment.html">新增評估</a>
      </div>

      <div id="config-warning" class="warning" hidden>
        尚未設定 Supabase，請先修改 <code>js/config.js</code>。
      </div>
      <p id="record-message" class="message" aria-live="polite">
        正在讀取紀錄……
      </p>
      <section id="record-list" class="record-list" aria-label="疼痛紀錄"></section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./js/config.js"></script>
    <script src="./js/common.js"></script>
    <script src="./js/records.js"></script>
  </body>
</html>
