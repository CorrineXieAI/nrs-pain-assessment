<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>新增評估｜NRS 疼痛評估</title>
    <link rel="stylesheet" href="./style.css">
  </head>
  <body>
    <header class="site-header">
      <div class="header-inner">
        <a class="brand" href="./assessment.html">NRS 疼痛評估</a>
        <nav class="nav" aria-label="主要選單">
          <a href="./assessment.html">新增評估</a>
          <a href="./records.html">我的紀錄</a>
          <button class="button text" data-logout type="button">登出</button>
        </nav>
      </div>
    </header>

    <main class="container">
      <div class="page-heading">
        <div>
          <p class="eyebrow">New assessment</p>
          <h1>新增疼痛評估</h1>
          <p class="muted">登入帳號：<span id="user-email">讀取中</span></p>
        </div>
      </div>

      <div id="config-warning" class="warning" hidden>
        尚未設定 Supabase，請先修改 <code>js/config.js</code>。
      </div>

      <form id="assessment-form" class="card stack">
        <div class="grid-2">
          <label>
            姓名或受測者代號
            <input
              id="participant-name"
              type="text"
              maxlength="50"
              placeholder="例如：P001"
              required
            >
          </label>

          <label>
            年齡
            <input id="age" type="number" min="0" max="120">
          </label>
        </div>

        <div class="grid-2">
          <label>
            生理性別
            <select id="biological-sex">
              <option value="">不填寫</option>
              <option value="male">男</option>
              <option value="female">女</option>
              <option value="other">其他</option>
              <option value="prefer_not_to_say">不願回答</option>
            </select>
          </label>

          <label>
            疼痛部位
            <input
              id="pain-location"
              type="text"
              maxlength="100"
              placeholder="例如：腰部"
              required
            >
          </label>
        </div>

        <fieldset>
          <legend>NRS 疼痛程度（0～10 分）</legend>
          <div class="score-panel">
            <div id="score-card" class="score-card" data-level="none">
              <span id="score-number">0</span>
              <span id="score-label">不痛</span>
            </div>

            <div>
              <input
                id="pain-score"
                type="range"
                min="0"
                max="10"
                step="1"
                value="0"
                aria-label="疼痛分數"
              >
              <div class="scale-labels" aria-hidden="true">
                <span>0 不痛</span>
                <span>5 中度</span>
                <span>10 非常痛</span>
              </div>
            </div>
          </div>
        </fieldset>

        <label class="checkbox">
          <input id="analgesic-used" type="checkbox">
          此次疼痛已使用止痛藥
        </label>

        <label>
          備註（最多 500 字）
          <textarea
            id="notes"
            maxlength="500"
            placeholder="可不填寫"
          ></textarea>
        </label>

        <button id="submit-button" class="button" type="submit">
          儲存評估
        </button>
        <p id="assessment-message" class="message" aria-live="polite"></p>
      </form>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./js/config.js"></script>
    <script src="./js/common.js"></script>
    <script src="./js/assessment.js"></script>
  </body>
</html>
