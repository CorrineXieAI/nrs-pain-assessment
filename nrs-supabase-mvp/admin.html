<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>管理者介面｜NRS 疼痛評估</title>
    <link rel="stylesheet" href="./style.css">
  </head>
  <body>
    <header class="site-header">
      <div class="header-inner">
        <a class="brand" href="./admin.html">NRS 管理者介面</a>
        <nav class="nav" aria-label="管理選單">
          <span class="muted" id="admin-email">驗證中</span>
          <button class="button text" data-logout type="button">登出</button>
        </nav>
      </div>
    </header>

    <main class="container">
      <div class="page-heading">
        <div>
          <p class="eyebrow">Admin dashboard</p>
          <h1>評估紀錄總覽</h1>
          <p class="muted">僅管理員可以查看所有使用者的紀錄。</p>
        </div>
      </div>

      <div id="config-warning" class="warning" hidden>
        尚未設定 Supabase，請先修改 <code>js/config.js</code>。
      </div>

      <section class="stats" aria-label="評估統計">
        <article class="stat">
          總評估數
          <strong id="total-count">0</strong>
        </article>
        <article class="stat">
          平均疼痛分數
          <strong id="average-score">0.0</strong>
        </article>
        <article class="stat">
          嚴重疼痛筆數
          <strong id="severe-count">0</strong>
        </article>
      </section>

      <p id="admin-message" class="message" aria-live="polite">
        正在讀取紀錄……
      </p>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>評估時間</th>
              <th>姓名／代號</th>
              <th>年齡</th>
              <th>性別</th>
              <th>疼痛部位</th>
              <th>分數</th>
              <th>程度</th>
              <th>止痛藥</th>
            </tr>
          </thead>
          <tbody id="admin-record-list"></tbody>
        </table>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./js/config.js"></script>
    <script src="./js/common.js"></script>
    <script src="./js/admin.js"></script>
  </body>
</html>
