<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>登入｜NRS 疼痛評估</title>
    <link rel="stylesheet" href="./style.css">
  </head>
  <body>
    <main class="container narrow">
      <section class="card">
        <p class="eyebrow">NRS Pain Assessment</p>
        <h1>疼痛評估系統</h1>
        <p class="lead">登入後填寫評估，並查看自己的歷次紀錄。</p>

        <div id="config-warning" class="warning" hidden>
          尚未設定 Supabase。請依照「操作教學.md」修改
          <code>js/config.js</code>。
        </div>

        <form id="login-form" class="stack">
          <label>
            Email
            <input
              id="email"
              type="email"
              autocomplete="email"
              placeholder="user@example.com"
              required
            >
          </label>

          <label>
            密碼
            <input
              id="password"
              type="password"
              autocomplete="current-password"
              minlength="8"
              required
            >
          </label>

          <button id="login-button" class="button full" type="submit">
            登入
          </button>
          <p id="login-message" class="message" aria-live="polite"></p>
        </form>

        <p class="muted">
          一般使用者與管理員使用相同入口，系統會依角色進入不同頁面。
        </p>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./js/config.js"></script>
    <script src="./js/common.js"></script>
    <script src="./js/login.js"></script>
  </body>
</html>
